name: docker

# Builds and pushes the MCP server image to GHCR.
#   - on push to main: tags `:edge`
#   - on push of tag `v*.*.*`: tags `:vX.Y.Z` + `:vX.Y` + `:latest`
# Multi-arch (linux/amd64, linux/arm64) for client portability.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/plant-genomics-mcp
          tags: |
            type=ref,event=branch,suffix=,enable=${{ github.ref == 'refs/heads/main' }},value=edge
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compute image tags (http)
        id: meta_http
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/plant-genomics-mcp-http
          tags: |
            type=ref,event=branch,suffix=,enable=${{ github.ref == 'refs/heads/main' }},value=edge
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push (http)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.http
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_http.outputs.tags }}
          labels: ${{ steps.meta_http.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

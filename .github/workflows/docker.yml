name: docker

# Builds and pushes the MCP server image to GHCR.
#   - on push to main: tags `:edge`
#   - on release published: tags `:vX.Y.Z` + `:vX.Y` + `:latest` (canonical)
#   - on push of tag `v*.*.*`: same tags (fallback — see release runbook below)
# Multi-arch (linux/amd64, linux/arm64) for client portability.
#
# Release runbook (canonical):
#   gh release create vX.Y.Z --generate-notes --target main
# This creates the tag, the GitHub Release object, and fires `release: published`
# reliably. Do NOT rely on `git push --follow-tags` to trigger this workflow —
# annotated tags pushed atomically with a branch can be silently dropped by
# GitHub's webhook delivery (observed v1.1.0, 2026-05-24). The `push: tags:`
# trigger below is kept as a safety net but is unreliable for annotated tags.
# If a release tag push didn't fire this workflow, run:
#   gh workflow run docker.yml --ref vX.Y.Z

on:
  release:
    types: [published]
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/plant-genomics-mcp
          tags: |
            type=ref,event=branch,suffix=,enable=${{ github.ref == 'refs/heads/main' }},value=edge
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compute image tags (http)
        id: meta_http
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/plant-genomics-mcp-http
          tags: |
            type=ref,event=branch,suffix=,enable=${{ github.ref == 'refs/heads/main' }},value=edge
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push (http)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile.http
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_http.outputs.tags }}
          labels: ${{ steps.meta_http.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

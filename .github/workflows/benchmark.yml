name: benchmark

# Scheduled scientific-validation / drift monitor for the live backends.
# Runs scripts/benchmark_annotations.py weekly against the ~11 upstream APIs.
# Two-strikes: on a non-zero run we re-run ONLY the failing loci and page
# (Telegram + ntfy + red x) only if the same loci fail twice — so transient
# network blips (Europe PMC / ATTED) don't wake anyone. NOT run on push/PR
# (that CI is mocked + offline); schedule + manual only.
#
# Notifications mirror the homelab notify.sh fan-out (Telegram bot + the unified
# self-hosted ntfy topic), but hit both PUBLIC endpoints directly so the runner
# needs no tailnet access. See followup-ntfy-consolidation memo for notify.sh.
#
# Operator secrets (set via `gh secret set <NAME>`):
#   TELEGRAM_BOT_TOKEN  BotFather token for the homelab bot (api.telegram.org)
#   TELEGRAM_CHAT_ID    destination chat id (homelab bot's chat)
#   BENCHMARK_NTFY_URL  full topic URL, e.g. https://ntfy.sh/mjarnold-homelab-<id>

on:
  schedule:
    - cron: "0 11 * * 1" # Mon 11:00 UTC (~6-7am ET)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # bound the whole run so a wedged backend can't pin the job
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run benchmark (strike 1)
        id: run1
        run: |
          set +e
          python scripts/benchmark_annotations.py --output-json last_run.ci.json
          code=$?
          set -e
          echo "exit=$code" >> "$GITHUB_OUTPUT"

      - name: Re-run failing loci (strike 2)
        id: run2
        if: steps.run1.outputs.exit != '0'
        run: |
          set +e
          FAILED=$(python scripts/benchmark_failing_loci.py last_run.ci.json)
          echo "failed_loci=$FAILED" >> "$GITHUB_OUTPUT"
          if [ -z "$FAILED" ]; then
            # Non-zero exit but no per-locus failing verdict => script-level
            # problem, not a flaky locus. Don't swallow it — treat as confirmed.
            echo "exit=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python scripts/benchmark_annotations.py --loci "$FAILED" --output-json rerun.ci.json
          code=$?
          set -e
          echo "exit=$code" >> "$GITHUB_OUTPUT"

      - name: Determine confirmed failure
        id: verdict
        run: |
          R1='${{ steps.run1.outputs.exit }}'
          R2='${{ steps.run2.outputs.exit }}'
          if [ "$R1" != '0' ] && [ "$R2" != '0' ]; then
            echo "confirmed=1" >> "$GITHUB_OUTPUT"
          else
            echo "confirmed=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Page Telegram
        if: steps.verdict.outputs.confirmed == '1'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          FAILED='${{ steps.run2.outputs.failed_loci }}'
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="🚨 [ALERT] plant-genomics benchmark FAIL (2 strikes). Failing loci: ${FAILED:-<script-level>}. Run: ${RUN_URL}"
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "::warning::TELEGRAM_BOT_TOKEN/TELEGRAM_CHAT_ID unset — skipping Telegram page"
          else
            curl -fsS --max-time 20 \
              "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT}" \
              --data-urlencode "text=${MSG}"
          fi

      - name: Page ntfy (unified topic)
        if: steps.verdict.outputs.confirmed == '1'
        run: |
          FAILED='${{ steps.run2.outputs.failed_loci }}'
          URL='${{ secrets.BENCHMARK_NTFY_URL }}'
          if [ -z "$URL" ]; then
            echo "::warning::BENCHMARK_NTFY_URL unset — skipping ntfy page"
          else
            curl -fsS --max-time 20 \
              -H 'Title: [ALERT] plant-genomics benchmark FAIL' \
              -H 'Priority: high' \
              -H 'Tags: warning,dna' \
              -d "Benchmark confirmed FAIL (2 strikes). Failing loci: ${FAILED:-<script-level>}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              "$URL"
          fi

      - name: Upload sidecars
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-sidecars
          path: |
            last_run.ci.json
            rerun.ci.json
          if-no-files-found: warn

      - name: Fail job on confirmed failure
        if: steps.verdict.outputs.confirmed == '1'
        run: exit 1

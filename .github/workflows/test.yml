name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Must span the whole `requires-python = ">=3.11"` range, not just the
        # oldest two — PyPI installers on the newest interpreters were running
        # code CI had never exercised (audit 2026-07-22, M1).
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Types (mypy)
        # Two invocations, not `mypy src tests`: passing the package dir and
        # tests/ in one call trips mypy's duplicate-module resolution (every
        # `from plant_genomics_mcp import X` reads as a missing attribute).
        # Checked separately, tests resolve the package from the installed dist.
        run: |
          mypy src/plant_genomics_mcp
          mypy tests
      - name: Test (mocked + stdio smoke; live network gated by PLANT_GENOMICS_MCP_LIVE=1)
        env:
          PLANT_GENOMICS_MCP_STDIO_SMOKE: "1"
        run: pytest -q --cov=src --cov-report=term --cov-report=xml

name: Publish to MCP Registry
# Submits server.json to the official MCP registry via GitHub Actions OIDC
# (mcp-publisher login github-oidc) — no device flow, no stored credentials.
# The OIDC token's repository_owner ("musharna") grants the io.github.musharna/*
# namespace.
#
# Triggered by the `vX.Y.Z` tag push (the same event that fires release.yml) —
# NOT by `release: published`. release.yml's github-release job creates the
# GitHub release as the default GITHUB_TOKEN, and GitHub suppresses workflow
# triggers from GITHUB_TOKEN-raised events (recursion prevention), so a
# `release: published` trigger here would silently never fire. The tag push is
# a real user push and does trigger workflows. The wait-for-PyPI step below
# handles the race with release.yml's parallel PyPI upload. workflow_dispatch
# stays for backfills (e.g. republishing the current version).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
jobs:
  registry-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for mcp-publisher login github-oidc
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Wait for the PyPI release to be queryable
        # release.yml uploads to PyPI in a parallel run; the registry validates
        # the PyPI package + its mcp-name marker, so block until it is live.
        run: |
          VER=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          for i in $(seq 1 30); do
            if curl -fsSL "https://pypi.org/pypi/plant-genomics-mcp/$VER/json" >/dev/null; then
              echo "PyPI $VER is live"; exit 0
            fi
            echo "waiting for PyPI $VER ($i/30)"; sleep 10
          done
          echo "PyPI $VER did not appear within 5 minutes"; exit 1
      - name: Install mcp-publisher
        # Pinned; bump alongside registry server.json schema changes.
        run: curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
      - name: Log in to the MCP registry via GitHub Actions OIDC
        run: ./mcp-publisher login github-oidc
      - name: Publish server.json
        run: ./mcp-publisher publish
